<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
body {
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, sans-serif;
  background:#e7f0fb;

  height:100vh;
  overflow:hidden;
  padding-bottom: env(safe-area-inset-bottom);
}

/* 헤더 */
.header {
  background:white;
  padding:14px;
  padding-top: calc(14px + env(safe-area-inset-top)); /* 🔥 핵심 */
  text-align:center;
  position:relative;
  font-weight:600;
}

.back {
  position:absolute;
  left:10px;
}

.gov {
  position:absolute;
  left:35px;
  font-weight:bold;
}

.menu {
  position:absolute;
  right:10px;
  cursor:pointer;
}

/* 카드 */
.card {
  background:white;
  margin:20px;
  border-radius:18px;
  padding:20px;
  box-shadow:0 6px 15px rgba(0,0,0,0.1);
}

/* 사진 */
.photo {
  width:160px;
  height:200px;
  object-fit:cover;
  border-radius:10px;
  display:block;
  margin:10px auto;
}

/* 정보 */
.infoRow {
  display:flex;
  justify-content:space-between;
  margin-top:20px;
}

.gray {
  font-size:12px;
  color:gray;
}

.name {
  font-size:22px;
  font-weight:bold;
}

.detail {
  margin-top:8px;
  font-size:14px;
  line-height:1.6;
  font-weight:600;
}

/* QR */
.qr img {
  width:110px;
}

/* 타이머 */
.timer {
  margin-top:20px;
  font-size:13px;
}

.bar {
  height:4px;
  background:#ddd;
  margin-top:10px;
  border-radius:4px;
  overflow:hidden;
}

.fill {
  height:100%;
  width:100%;
  background:#2f6cff;
  transition: width 1s linear;
}

.timeRow {
  display:flex;
  justify-content:space-between;
  margin-top:8px;
  color:#2f6cff;
  font-weight:bold;
}

/* 버튼 */
.bottom {
  margin:20px;
  padding:15px;
  background:#2f6cff;
  color:white;
  text-align:center;
  border-radius:10px;
  cursor:pointer;
}

/* 모달 */
.modal {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
}

.modalContent {
  background:white;
  margin:60px 20px;
  padding:20px;
}

input {
  width:100%;
  margin:5px 0;
  padding:8px;
}

button {
  width:100%;
  padding:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="header">
  <div class="back">◀</div>
  <div class="gov">정부24</div>
  주민등록증 모바일확인서비스
  <div class="menu" onclick="menuTap()">≡</div>
</div>

<div class="card">

  <img id="img" class="photo" src="https://via.placeholder.com/150">

  <div class="infoRow">
    <div>
      <div class="gray">모바일 신분증 확인서비스</div>
      <div class="name" id="name">홍길동</div>
      <div id="detail" class="detail"></div>
    </div>

    <div class="qr">
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=110x110&data=test">
    </div>
  </div>

  <div class="timer">
    <div class="bar"><div class="fill" id="bar"></div></div>
    <div class="timeRow">
      <div>남은시간</div>
      <div><span id="time">30</span>초</div>
    </div>
  </div>

</div>

<div class="bottom" onclick="toggleDetail()">상세정보 표시</div>

<div class="modal" id="modal">
  <div class="modalContent">
    <input id="nameInput" placeholder="이름">
    <input id="birthInput" placeholder="생년월일">
    <input id="addrInput" placeholder="주소">
    <input id="regionInput" placeholder="지역">
    <input type="file" onchange="changeImg(event)">
    <button onclick="apply()">저장</button>
  </div>
</div>

<script>
const modal = document.getElementById("modal");
const nameEl = document.getElementById("name");
const imgEl = document.getElementById("img");

const nameInput = document.getElementById("nameInput");
const birthInput = document.getElementById("birthInput");
const addrInput = document.getElementById("addrInput");
const regionInput = document.getElementById("regionInput");
const detail = document.getElementById("detail");

let tapCount = 0;

function menuTap(){
  tapCount++;
  if(tapCount >= 4){
    nameInput.value = localStorage.getItem("name") || "홍길동";
    birthInput.value = localStorage.getItem("birth") || "";
    addrInput.value = localStorage.getItem("addr") || "";
    regionInput.value = localStorage.getItem("region") || "";
    modal.style.display = "block";
    tapCount = 0;
  }
}

function changeImg(e){
  let reader = new FileReader();
  reader.onload = function(){
    imgEl.src = reader.result;
    localStorage.setItem("img", reader.result);
  }
  reader.readAsDataURL(e.target.files[0]);
}

function apply(){
  const newName = nameInput.value;

  localStorage.setItem("name", newName);
  localStorage.setItem("birth", birthInput.value);
  localStorage.setItem("addr", addrInput.value);
  localStorage.setItem("region", regionInput.value);

  nameEl.innerText = newName;

  detail.innerHTML =
    (birthInput.value || "") + "<br>" +
    (regionInput.value || "") + "<br>" +
    (addrInput.value || "");

  modal.style.display = "none";
}

function toggleDetail(){
  if(detail.style.display === "block"){
    detail.style.display = "none";
  } else {
    detail.innerHTML =
      (localStorage.getItem("birth") || "") + "<br>" +
      (localStorage.getItem("region") || "") + "<br>" +
      (localStorage.getItem("addr") || "");
    detail.style.display = "block";
  }
}

let time = 30;
let max = 30;

setInterval(()=>{
  time--;
  if(time < 0){
    time = max;
    document.getElementById("bar").style.transition = "none";
    document.getElementById("bar").style.width = "100%";
    setTimeout(()=>{
      document.getElementById("bar").style.transition = "width 1s linear";
    },50);
  }

  document.getElementById("time").innerText = time;
  document.getElementById("bar").style.width = (time/max)*100 + "%";
},1000);

window.onload = function(){
  const savedName = localStorage.getItem("name");
  const savedImg = localStorage.getItem("img");

  if(savedName) nameEl.innerText = savedName;
  if(savedImg) imgEl.src = savedImg;
};
</script>

</body>
</html>
